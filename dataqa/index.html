<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoParquet QA · Statistical Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="light">

  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      GEOPARQUET QA
    </div>
    <div class="header-meta">
      <a href="https://github.com/danylaksono/apps/tree/main/dataqa" target="_blank" rel="noopener noreferrer" style="
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background-color: #24292e;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
    ">
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
        0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
        -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
        .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
        0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
        .64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82
        2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
        0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
        0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8
        c0-4.42-3.58-8-8-8z" />
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <div class="container">

    <!-- Drop Zone -->
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple accept=".parquet" />
      <div class="drop-icon">📂</div>
      <div class="drop-title">Drop GeoParquet files here</div>
      <div class="drop-sub">or click to browse · .parquet files only · multiple supported</div>
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="controls">
      <button class="btn btn-primary" id="run-btn" disabled>▶ Run Analysis</button>
      <button class="btn btn-ghost" id="clear-btn" disabled>✕ Clear All</button>
      <button class="btn btn-ghost" id="csv-btn" disabled>↓ Export CSV</button>
      <button class="btn btn-ghost" id="theme-btn" type="button">Dark theme</button>
      <label class="sentinel-label">

        Sentinel value
        <input class="sentinel-input" id="sentinel-input" type="text" value="-123456" />
      </label>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="log" id="log"></div>

    <!-- Results -->
    <div id="results-section" style="display:none">
      <div class="section-header">
        <span class="section-title">Statistical Summary</span>
        <span class="section-count" id="results-count"></span>
      </div>
      <div id="la-blocks"></div>
    </div>

    <div class="empty" id="empty-state">
      <div class="empty-icon">◈</div>
      No data yet — upload .parquet files and run analysis
    </div>

  </div>

  <div class="toast" id="toast">
    <div class="toast-dot" id="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
