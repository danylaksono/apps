name: Deploy apps site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            city-rose/package-lock.json
            cekplot/package-lock.json
            dataqa/package-lock.json
            h3_visualiser/package-lock.json
            joyplot/package-lock.json

      - name: Prepare deploy directory
        run: |
          bash scripts/prepare-deploy.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.9.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
