name: Deploy apps site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies (city-rose)
        run: npm ci
        working-directory: city-rose

      - name: Build city-rose
        run: npm run build
        working-directory: city-rose

      - name: Prepare deploy directory
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R index.html walk sector7 archive deploy/
          mkdir -p deploy/city-rose
          cp -R city-rose/dist/* deploy/city-rose/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.9.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          destination_dir: apps
          publish_branch: gh-pages
