name: Deploy apps site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: city-rose/package-lock.json

      - name: Install dependencies (city-rose)
        run: npm ci
        working-directory: city-rose

      - name: Build city-rose
        run: npm run build
        working-directory: city-rose

      - name: Install dependencies (joyplot)
        run: npm ci
        working-directory: joyplot

      - name: Build joyplot
        run: npm run build
        working-directory: joyplot

      - name: Prepare deploy directory
        run: |
          bash scripts/prepare-deploy.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.9.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
