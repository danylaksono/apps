<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isochrone Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="header">
    <div id="header-left">
      <div class="logo-dot"></div>
      <h1>Isochrone Generator</h1>
    </div>
    <div id="header-meta">OSM · Walk Network · No API Key</div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="panel">
      <div id="panel-scroll">

        <div class="psec">
          <div class="sec-label">Walking Speed</div>
          <div class="slider-row">
            <span class="slider-label">km / h</span>
            <span class="slider-val" id="speed-display">4.5</span>
          </div>
          <input type="range" id="speed" min="2" max="7" step="0.5" value="4.5">
        </div>

        <div class="psec">
          <div class="sec-label">Time Rings</div>
          <div id="rings-list"></div>
          <button class="btn-add-ring" id="btn-add-ring">+ Add ring</button>
        </div>

        <div class="psec">
          <div class="sec-label">Origins</div>
          <div id="drop-zone">
            <input type="file" id="geojson-input" accept=".geojson,.json">
            <div id="drop-zone-label">
              <strong>Upload GeoJSON Points</strong>
              drag &amp; drop or click to browse
            </div>
          </div>
          <div id="origin-info"></div>
        </div>

        <div class="psec">
          <div class="sec-label">Status</div>
          <div id="status">Click the map to set an origin, or upload a GeoJSON.</div>
          <div class="action-row">
            <button class="btn primary" id="btn-run" disabled>&#9654; Run</button>
            <button class="btn" id="btn-download" disabled>&#8595; GeoJSON</button>
            <button class="btn" id="btn-clear">&#10005; Clear</button>
          </div>
        </div>

      </div>
    </div>

    <div id="hint">Click the map to set origin — or upload a GeoJSON</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
